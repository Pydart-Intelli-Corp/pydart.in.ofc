# Nginx configuration for multi-domain hosting on port 85
# Place this in: /etc/nginx/sites-available/

# Upstream configuration for Next.js app
upstream nextjs_pydart {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP to HTTPS redirect - pydart.com (Port 85)
server {
    listen 85;
    listen [::]:85;
    server_name pydart.com www.pydart.com;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server - pydart.com (Port 85 with SSL)
server {
    listen 85 ssl http2;
    listen [::]:85 ssl http2;
    server_name pydart.com www.pydart.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/pydart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pydart.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Root directory
    root /var/www/pydart.in;

    # Logs
    access_log /var/log/nginx/pydart.com-access.log;
    error_log /var/log/nginx/pydart.com-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Static files caching
    location /_next/static/ {
        alias /var/www/pydart.in/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        alias /var/www/pydart.in/public/;
        expires 365d;
        access_log off;
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://nextjs_pydart;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

